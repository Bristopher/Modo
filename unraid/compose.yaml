# Standalone Fluxer deployment for Unraid — PREBUILT images, NO source tree needed.
#
# This is the only compose file you run on the NAS. It references images you built and
# `docker save`d on your dev box, so Unraid never needs the monorepo source.
#
# Folder layout on the NAS (copy just these — a handful of files, not the repo):
#   unraid/
#     compose.yaml        <- this file
#     .env                <- image tags + SMTP password + FLUXER_APPDATA (see below)
#     config/
#       config.json       <- seeded on your dev box (secrets, voice keys, your domain)
#       livekit.yaml      <- rendered by the seeder (voice)
#       Caddyfile         <- routing (copy from repo config/)
#
# IMPORTANT (Compose Manager): config is bind-mounted via ${FLUXER_APPDATA}. The plugin
# runs the stack from its OWN project dir, so a relative ./config would miss. Set the
# absolute path to THIS unraid/ folder in .env, e.g.:
#   FLUXER_APPDATA=/mnt/user/nvme_array/appdata/Fluxer/unraid
# (Running plain `docker compose` from inside this folder? The `.` default below also works.)
#
# Deploy:
#   docker network create bignet             # if it doesn't already exist
#   docker compose pull                      # or `docker load -i fluxer-images.tar` for the tar path
#   docker compose --profile voice up -d     # (drop --profile voice if not using voice)
#
# Reverse proxy (NPM, on bignet): forward host `caddy` port `8080`, Websockets ON.

x-logging: &default-logging
  driver: json-file
  options:
    max-size: '10m'
    max-file: '5'

networks:
  # Your existing custom network. NPM lives here too and reaches `caddy:8080` directly.
  bignet:
    external: true

services:
  valkey:
    image: valkey/valkey:8.0.6-alpine
    container_name: valkey
    restart: unless-stopped
    command: ['valkey-server', '--appendonly', 'yes', '--save', '60', '1', '--loglevel', 'warning']
    volumes:
      - valkey_data:/data
    healthcheck:
      test: ['CMD', 'valkey-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging

  nats:
    image: nats:2.10-alpine
    container_name: nats
    restart: unless-stopped
    command: ['--jetstream', '--store_dir=/data', '--http_port=8222']
    volumes:
      - nats_data:/data
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:8222/healthz || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging

  fluxer_server:
    image: ${FLUXER_SERVER_IMAGE:-fluxer-server:local}
    container_name: fluxer_server
    restart: unless-stopped
    init: true
    environment:
      FLUXER_CONFIG: /usr/src/app/config/config.json
      NODE_ENV: production
      # SMTP password injected from .env (never baked into config.json).
      FLUXER_CONFIG__INTEGRATIONS__EMAIL__SMTP__PASSWORD: ${FLUXER_SMTP_PASSWORD:-}
    depends_on:
      valkey:
        condition: service_healthy
      nats:
        condition: service_healthy
    volumes:
      - ${FLUXER_APPDATA:-.}/config:/usr/src/app/config:ro
      - fluxer_data:/usr/src/app/data
    healthcheck:
      test: ['CMD-SHELL', 'curl -fsS http://127.0.0.1:8080/_health || exit 1']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    logging: *default-logging

  fluxer_gateway:
    image: ${FLUXER_GATEWAY_IMAGE:-fluxer-gateway:local}
    container_name: fluxer_gateway
    restart: unless-stopped
    init: true
    environment:
      FLUXER_CONFIG: /usr/src/app/config/config.json
    depends_on:
      nats:
        condition: service_healthy
      fluxer_server:
        condition: service_healthy
    volumes:
      - ${FLUXER_APPDATA:-.}/config:/usr/src/app/config:ro
    healthcheck:
      test: ['CMD-SHELL', 'curl -fsS http://127.0.0.1:8082/_health || exit 1']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging: *default-logging

  caddy:
    image: caddy:2-alpine
    container_name: caddy
    restart: unless-stopped
    depends_on:
      fluxer_server:
        condition: service_healthy
      fluxer_gateway:
        condition: service_healthy
    networks:
      - default # reach fluxer_server / fluxer_gateway / mailpit / livekit
      - bignet # NPM reaches this container here, as caddy:8080
    volumes:
      - ${FLUXER_APPDATA:-.}/config/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:8080/_caddy_health || exit 1']
      interval: 15s
      timeout: 5s
      retries: 5
    logging: *default-logging

  # Optional. You're on real Gmail SMTP, so this is just a fallback/debug inbox at
  # /mailpit/. Safe to delete this service if you don't want it.
  mailpit:
    image: axllent/mailpit:latest
    container_name: mailpit
    restart: unless-stopped
    environment:
      MP_WEBROOT: /mailpit/
    volumes:
      - mailpit_data:/data
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:8025/mailpit/ || exit 1']
      interval: 15s
      timeout: 5s
      retries: 5
    logging: *default-logging

  livekit:
    image: livekit/livekit-server:v1.9.11
    container_name: livekit
    # Always-on (no `profiles:` gate) — this deploy always wants voice, so a plain
    # `docker compose up -d` / Compose Manager "Up" includes LiveKit with no profile flag.
    restart: unless-stopped
    command: ['--config', '/etc/livekit/livekit.yaml']
    volumes:
      - ${FLUXER_APPDATA:-.}/config/livekit.yaml:/etc/livekit/livekit.yaml:ro
    # Signaling (7880) is fronted by Caddy at /livekit. Media uses a single muxed UDP
    # port + TCP fallback + TURN — forward 7882/udp, 7881/tcp, 3478/udp on your router.
    ports:
      - '7881:7881/tcp'
      - '7882:7882/udp'
      - '3478:3478/udp'
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:7880 || exit 1']
      interval: 15s
      timeout: 5s
      retries: 5
    logging: *default-logging

volumes:
  valkey_data:
  nats_data:
  fluxer_data:
  caddy_data:
  caddy_config:
  mailpit_data:
