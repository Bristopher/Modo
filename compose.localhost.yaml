# Localhost turnkey override for compose.yaml.
#
#   docker compose -f compose.yaml -f compose.localhost.yaml up -d
#
# Adds a Caddy front door (sole host entrypoint on :8080) and Mailpit (captures
# verification emails so you can register an account), and removes the direct
# host port mappings from the server/gateway so everything goes through Caddy.
#
# Use with config/config.localhost.template.json (base_domain=localhost, :8080).

services:
  # Caddy is the only service bound to the host. All client-derived endpoints
  # (/api, /gateway, /media, ...) resolve to this single origin.
  caddy:
    image: caddy:2-alpine
    container_name: caddy
    restart: unless-stopped
    depends_on:
      fluxer_server:
        condition: service_healthy
      fluxer_gateway:
        condition: service_healthy
    ports:
      # Host port your reverse proxy (NPM/SWAG) forwards to. NOT the public URL port —
      # that is PUBLIC_PORT (baked into the build/config). For localhost both are 8080.
      - '${HOST_HTTP_PORT:-8080}:8080'
    volumes:
      - ./config/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:8080/_caddy_health || exit 1']
      interval: 15s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '5'

  # Captures all outbound dev email. Inbox proxied at http://localhost:8080/mailpit/
  mailpit:
    image: axllent/mailpit:latest
    container_name: mailpit
    restart: unless-stopped
    environment:
      MP_WEBROOT: /mailpit/
    volumes:
      - mailpit_data:/data
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:8025/mailpit/ || exit 1']
      interval: 15s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '5'

  # The published ghcr.io/fluxerapp/fluxer-server image is NOT publicly available
  # (all tags denied — self-hosting is pre-release), so build it locally from
  # source. Context is the repo root; the Dockerfile builds the API/app/gateway.
  # Caddy fronts it, so drop the direct host port binding (!reset needs Compose v2.24+).
  fluxer_server:
    build:
      context: .
      dockerfile: fluxer_server/Dockerfile
      args:
        # rspack bakes these endpoint URLs into the SPA bundle at build time, so they
        # MUST match config.json's domain block. Driven by .env — defaults to localhost.
        # static_cdn points at the public CDN so emoji/font assets resolve.
        FLUXER_BUILD_CONFIG: >-
          {"domain":{"base_domain":"${BASE_DOMAIN:-localhost}","public_scheme":"${PUBLIC_SCHEME:-http}","public_port":${PUBLIC_PORT:-8080},"endpoint_overrides":{"static_cdn":"https://fluxerstatic.com/static"}}}
        # Bake the NSFW ONNX model into the image (copies model.onnx to /opt/data). The
        # server reads it unconditionally on boot, so without this it crashes with ENOENT.
        INCLUDE_NSFW_ML: "true"
    image: fluxer-server:local
    ports: !reset []
  fluxer_gateway:
    ports: !reset []

volumes:
  caddy_data:
  caddy_config:
  mailpit_data:
