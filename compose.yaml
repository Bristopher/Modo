x-logging: &default-logging
  driver: json-file
  options:
    max-size: '10m'
    max-file: '5'

services:
  valkey:
    image: valkey/valkey:8.0.6-alpine
    container_name: valkey
    restart: unless-stopped
    command: ['valkey-server', '--appendonly', 'yes', '--save', '60', '1', '--loglevel', 'warning']
    volumes:
      - valkey_data:/data
    healthcheck:
      test: ['CMD', 'valkey-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging

  nats:
    image: nats:2.10-alpine
    container_name: nats
    restart: unless-stopped
    # JetStream enabled; monitoring endpoint on 8222 for healthcheck.
    # NATS is internal-only (no host ports). To enable token auth, append
    # '--auth=${NATS_AUTH_TOKEN}' below and set services.nats.auth_token to the
    # same value in config/config.json.
    command:
      - '--jetstream'
      - '--store_dir=/data'
      - '--http_port=8222'
    volumes:
      - nats_data:/data
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:8222/healthz || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging

  fluxer_server:
    image: ${FLUXER_SERVER_IMAGE:-ghcr.io/fluxerapp/fluxer-server:stable}
    container_name: fluxer_server
    restart: unless-stopped
    init: true
    environment:
      FLUXER_CONFIG: /usr/src/app/config/config.json
      NODE_ENV: production
    ports:
      - '${FLUXER_HTTP_PORT:-8080}:8080'
    depends_on:
      valkey:
        condition: service_healthy
      nats:
        condition: service_healthy
    volumes:
      - ./config:/usr/src/app/config:ro
      - fluxer_data:/usr/src/app/data
    healthcheck:
      test: ['CMD-SHELL', 'curl -fsS http://127.0.0.1:8080/_health || exit 1']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    logging: *default-logging

  # Erlang/OTP realtime WebSocket gateway. No public image is published
  # (upstream deploys it over SSH to private infra), so it is built locally
  # from ./fluxer_gateway. It reads the same config.json as the umbrella and
  # talks to the API over NATS (subject rpc.api) for token validation + events.
  fluxer_gateway:
    build:
      context: ./fluxer_gateway
    image: fluxer-gateway:local
    container_name: fluxer_gateway
    restart: unless-stopped
    init: true
    environment:
      FLUXER_CONFIG: /usr/src/app/config/config.json
    ports:
      # WS port is services.gateway.port in config.json (8082 in the prod template)
      - '${FLUXER_GATEWAY_PORT:-8082}:8082'
    depends_on:
      nats:
        condition: service_healthy
      fluxer_server:
        condition: service_healthy
    volumes:
      - ./config:/usr/src/app/config:ro
    healthcheck:
      test: ['CMD-SHELL', 'curl -fsS http://127.0.0.1:8082/_health || exit 1']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging: *default-logging

  meilisearch:
    image: getmeili/meilisearch:v1.14
    container_name: meilisearch
    profiles: ['search']
    restart: unless-stopped
    environment:
      MEILI_ENV: production
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:?Set MEILI_MASTER_KEY in .env or environment}
      MEILI_DB_PATH: /meili_data
      MEILI_HTTP_ADDR: 0.0.0.0:7700
    ports:
      - '${MEILI_PORT:-7700}:7700'
    volumes:
      - meilisearch_data:/meili_data
    healthcheck:
      test: ['CMD-SHELL', 'curl -fsS http://127.0.0.1:7700/health || exit 1']
      interval: 15s
      timeout: 5s
      retries: 5
    logging: *default-logging

  elasticsearch:
    image: elasticsearch:8.19.11
    container_name: elasticsearch
    profiles: ['search']
    restart: unless-stopped
    environment:
      discovery.type: single-node
      xpack.security.enabled: 'false'
      xpack.security.http.ssl.enabled: 'false'
      ES_JAVA_OPTS: '-Xms512m -Xmx512m'
    ports:
      - '${ELASTICSEARCH_PORT:-9200}:9200'
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ['CMD-SHELL', 'curl -fsS http://127.0.0.1:9200/_cluster/health || exit 1']
      interval: 15s
      timeout: 5s
      retries: 5
    logging: *default-logging

  livekit:
    image: livekit/livekit-server:v1.9.11
    container_name: livekit
    profiles: ['voice']
    restart: unless-stopped
    command: ['--config', '/etc/livekit/livekit.yaml']
    volumes:
      - ./config/livekit.yaml:/etc/livekit/livekit.yaml:ro
    ports:
      - '${LIVEKIT_PORT:-7880}:7880'
      - '7881:7881'
      - '3478:3478/udp'
      - '50000-50100:50000-50100/udp'
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:7880 || exit 1']
      interval: 15s
      timeout: 5s
      retries: 5
    logging: *default-logging

volumes:
  valkey_data:
  fluxer_data:
  nats_data:
  meilisearch_data:
  elasticsearch_data:
